name: Build Base Image

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "dockerfile.base"
      - "build_resources/essentia/**"
      - "build_resources/scripts/**"

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/nomarr-base"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BASE_VERSION=$(cat BASE_VERSION)

          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${REPO}:latest,${REPO}:v${BASE_VERSION},${REPO}:sha-${SHORT_SHA}"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            TAGS="${REPO}:develop,${REPO}:v${BASE_VERSION},${REPO}:sha-${SHORT_SHA}"
          else
            TAGS="${REPO}:sha-${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Image tags: ${TAGS}"

      - name: Build and push base image with attestation
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile.base
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr-base:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr-base:latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr-base:buildcache,mode=max
          provenance: true
          sbom: true
