name: Bump Base Version

on:
  push:
    branches: [develop]
    paths:
      - "dockerfile.base"
      - "build_resources/essentia/**"
      - "build_resources/scripts/**"

jobs:
  bump-base-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Bump BASE_VERSION patch
        id: bump
        run: |
          CURRENT=$(cat BASE_VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          printf '%s' "${NEW_VERSION}" > BASE_VERSION
          echo "old_version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/bump-base-version-${{ steps.bump.outputs.new_version }}
          base: develop
          title: "chore: bump BASE_VERSION to ${{ steps.bump.outputs.new_version }}"
          body: |
            Automated BASE_VERSION bump triggered by changes to the base image build context.

            - Previous version: `${{ steps.bump.outputs.old_version }}`
            - New version: `${{ steps.bump.outputs.new_version }}`

            This PR was opened automatically when `dockerfile.base` or `build_resources/` dependencies changed.
          commit-message: "chore: bump BASE_VERSION to ${{ steps.bump.outputs.new_version }}"
          labels: chore,automated