name: Merge develop → main

on:
  workflow_dispatch:
    inputs:
      merge_message:
        description: "Merge commit message"
        required: false
        default: "chore: merge develop into main"

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or merge PR from develop to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_MESSAGE: ${{ github.event.inputs.merge_message }}
        run: |
          PR_URL=$(gh pr list --base main --head develop --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --base main --head develop \
              --title "$MERGE_MESSAGE" \
              --body "Manually triggered merge from develop to main.")
          fi
          gh pr merge "$PR_URL" --merge