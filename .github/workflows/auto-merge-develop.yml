name: Auto-merge develop → main

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or merge PR from develop to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --base main --head develop --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --base main --head develop \
              --title "chore: merge develop into main" \
              --body "Auto-created by CI after successful develop build.")
          fi
          gh pr merge "$PR_URL" --merge --auto