name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "nomarr/**"
      - "tests/**"
      - "frontend/**"
      - "e2e/**"
      - "dockerfile"
      - "docker/compose.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "playwright.config.ts"
      - "BASE_VERSION"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "nomarr/**"
      - "tests/**"
      - "frontend/**"
      - "e2e/**"
      - "dockerfile"
      - "docker/compose.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff check)
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Format check (ruff format)
        run: |
          source .venv/bin/activate
          ruff format --check .

      - name: Type check (mypy)
        run: |
          source .venv/bin/activate
          mypy nomarr/ --config-file pyproject.toml

      - name: Import linter
        run: |
          source .venv/bin/activate
          lint-imports

  frontend-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint (ESLint)
        run: npm run lint --prefix frontend

      - name: Type check (TypeScript)
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run backend tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -m "not container_only and not requires_database and not code_smell"

  build-and-push:
    needs: [lint, test, frontend-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      promote_tags: ${{ steps.tags.outputs.promote_tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Extract versions
        id: versions
        run: |
          VERSION=$(python3 -c "exec(open('nomarr/__version__.py').read()); print(__version__)")
          BASE_VERSION=$(cat BASE_VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION}"
          echo "Base version: ${BASE_VERSION}"

      - name: Compute image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/nomarr"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          VERSION="${{ steps.versions.outputs.version }}"
          BASE_VERSION="${{ steps.versions.outputs.base_version }}"

          SHA_TAG="${REPO}:${SHORT_SHA}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            SEMVER="${VERSION%.dev*}"
            PROMOTE_TAGS="${REPO}:latest,${REPO}:v${SEMVER}"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            VERSION_BASE="${VERSION%.dev*}"
            DEV_TAG="${VERSION_BASE}.dev${{ github.run_number }}"
            PROMOTE_TAGS="${REPO}:develop,${REPO}:${DEV_TAG}"
          else
            PROMOTE_TAGS=""
          fi
          BASE_TAG="v${BASE_VERSION}"

          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "promote_tags=${PROMOTE_TAGS}" >> $GITHUB_OUTPUT
          echo "base_tag=${BASE_TAG}" >> $GITHUB_OUTPUT
          echo "SHA tag: ${SHA_TAG}"
          echo "Promote tags: ${PROMOTE_TAGS}"
          echo "Base image tag: ${BASE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA-tagged image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          push: true
          build-args: |
            BASE_TAG=${{ steps.tags.outputs.base_tag }}
          tags: ${{ steps.tags.outputs.sha_tag }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:buildcache,mode=max
          provenance: true
          sbom: true

  e2e:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Docker environment files
        run: |
          cat > docker/nomarr.env <<'EOF'
          ARANGO_HOST=http://nomarr-arangodb:8529
          ARANGO_ROOT_PASSWORD=e2e_test_password
          EOF

          cat > docker/nomarr-arangodb.env <<'EOF'
          ARANGO_ROOT_PASSWORD=e2e_test_password
          ARANGO_NO_AUTH=0
          EOF

      - name: Create compose override for CI
        run: |
          cat > docker/compose.e2e.yaml <<'EOF'
          services:
            nomarr:
              container_name: nomarr
              image: ${{ needs.build-and-push.outputs.sha_tag }}
              user: "1000:1000"
              ports:
                - "8356:8356"
              volumes:
                - nomarr-config:/app/config
              env_file:
                - nomarr.env
              depends_on:
                nomarr-arangodb:
                  condition: service_healthy
              deploy: {}
              restart: "no"
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8356/info || exit 1"]
                interval: 5s
                timeout: 10s
                retries: 30
                start_period: 30s

            nomarr-arangodb:
              container_name: nomarr-arangodb
              image: arangodb:3.12
              env_file:
                - nomarr-arangodb.env
              command: ["--vector-index", "--query.memory-limit=1073741824"]
              volumes:
                - arangodb-data:/var/lib/arangodb3
              restart: "no"
              healthcheck:
                test: ["CMD-SHELL", "arangosh --server.endpoint tcp://127.0.0.1:8529 --server.username root --server.password \"$$ARANGO_ROOT_PASSWORD\" --javascript.execute-string 'db._version()' >/dev/null 2>&1"]
                interval: 5s
                timeout: 5s
                retries: 20
                start_period: 15s

          volumes:
            nomarr-config:
            arangodb-data:
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Nomarr image
        run: docker pull ${{ needs.build-and-push.outputs.sha_tag }}

      - name: Start containers
        working-directory: docker
        run: |
          docker compose -f compose.e2e.yaml up -d
          echo "Waiting for services to become healthy..."
          docker compose -f compose.e2e.yaml logs -f &
          LOG_PID=$!

          timeout 180 bash -c '
            while true; do
              NOMARR_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" nomarr 2>/dev/null || echo "missing")
              ARANGO_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" nomarr-arangodb 2>/dev/null || echo "missing")
              echo "  nomarr: ${NOMARR_HEALTH} | arangodb: ${ARANGO_HEALTH}"
              if [ "$NOMARR_HEALTH" = "healthy" ] && [ "$ARANGO_HEALTH" = "healthy" ]; then
                echo "All services healthy"
                break
              fi
              sleep 5
            done
          '
          kill $LOG_PID 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium --reporter=list,html
        env:
          CI: true

      - name: Dump container logs on failure
        if: failure()
        working-directory: docker
        run: |
          echo "========== NOMARR LOGS =========="
          docker compose -f compose.e2e.yaml logs nomarr --tail=200
          echo ""
          echo "========== ARANGODB LOGS =========="
          docker compose -f compose.e2e.yaml logs nomarr-arangodb --tail=100

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Stop containers
        if: always()
        working-directory: docker
        run: docker compose -f compose.e2e.yaml down -v

  promote:
    needs: [build-and-push, e2e]
    if: needs.build-and-push.outputs.promote_tags != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image with release tags
        run: |
          SHA_TAG="${{ needs.build-and-push.outputs.sha_tag }}"
          docker pull "${SHA_TAG}"
          IFS=',' read -ra TAGS <<< "${{ needs.build-and-push.outputs.promote_tags }}"
          for TAG in "${TAGS[@]}"; do
            echo "Tagging ${SHA_TAG} -> ${TAG}"
            docker tag "${SHA_TAG}" "${TAG}"
            docker push "${TAG}"
          done
