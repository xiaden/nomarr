name: CI

on:
  push:
    branches: [main, develop, 'feat/**']
    paths:
      - "nomarr/**"
      - "tests/**"
      - "frontend/**"
      - "e2e/**"
      - "dockerfile"
      - "docker/compose.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "playwright.config.ts"
      - "BASE_VERSION"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "nomarr/**"
      - "tests/**"
      - "frontend/**"
      - "e2e/**"
      - "dockerfile"
      - "docker/compose.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff check)
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Format check (ruff format)
        run: |
          source .venv/bin/activate
          ruff format --check .

      - name: Type check (mypy)
        run: |
          source .venv/bin/activate
          mypy nomarr/ --config-file pyproject.toml

      - name: Import linter
        run: |
          source .venv/bin/activate
          lint-imports

  frontend-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint (ESLint)
        run: npm run lint --prefix frontend

      - name: Type check (TypeScript)
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run backend tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -m "not container_only and not requires_database and not code_smell"

  build-and-push:
    needs: [lint, test, frontend-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      promote_tags: ${{ steps.tags.outputs.promote_tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Extract versions
        id: versions
        run: |
          VERSION=$(python3 -c "exec(open('nomarr/__version__.py').read()); print(__version__)")
          BASE_VERSION=$(cat BASE_VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION}"
          echo "Base version: ${BASE_VERSION}"

      - name: Compute image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/nomarr"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          VERSION="${{ steps.versions.outputs.version }}"
          BASE_VERSION="${{ steps.versions.outputs.base_version }}"

          SHA_TAG="${REPO}:${SHORT_SHA}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            SEMVER="${VERSION%.dev*}"
            PROMOTE_TAGS="${REPO}:latest,${REPO}:v${SEMVER}"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            VERSION_BASE="${VERSION%.dev*}"
            DEV_TAG="${VERSION_BASE}.dev${{ github.run_number }}"
            PROMOTE_TAGS="${REPO}:develop,${REPO}:${DEV_TAG}"
          else
            PROMOTE_TAGS="${REPO}:preview"
          fi
          BASE_TAG="v${BASE_VERSION}"

          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "promote_tags=${PROMOTE_TAGS}" >> $GITHUB_OUTPUT
          echo "base_tag=${BASE_TAG}" >> $GITHUB_OUTPUT
          echo "SHA tag: ${SHA_TAG}"
          echo "Promote tags: ${PROMOTE_TAGS}"
          echo "Base image tag: ${BASE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA-tagged image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          push: true
          build-args: |
            BASE_TAG=${{ steps.tags.outputs.base_tag }}
          tags: ${{ steps.tags.outputs.sha_tag }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nomarr:buildcache,mode=max
          provenance: true
          sbom: true

  promote:
    needs: [build-and-push]
    if: needs.build-and-push.outputs.promote_tags != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image with release tags
        run: |
          SHA_TAG="${{ needs.build-and-push.outputs.sha_tag }}"
          docker pull "${SHA_TAG}"
          IFS=',' read -ra TAGS <<< "${{ needs.build-and-push.outputs.promote_tags }}"
          for TAG in "${TAGS[@]}"; do
            echo "Tagging ${SHA_TAG} -> ${TAG}"
            docker tag "${SHA_TAG}" "${TAG}"
            docker push "${TAG}"
          done
