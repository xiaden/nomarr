# Pre-commit hooks: lint and type-check before every commit.
# Install: pre-commit install
# Manual run: pre-commit run --all-files

repos:
  # --- Ruff: lint + format (Python) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --- Mypy: type checking (Python) ---
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c ".venv/Scripts/python.exe -m mypy nomarr"
        language: system
        pass_filenames: false
        files: ^nomarr/

  # --- Import linter: layer boundary enforcement ---
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        entry: bash -c ".venv/Scripts/lint-imports.exe"
        language: system
        pass_filenames: false
        files: ^nomarr/

  # --- Frontend: ESLint + TypeScript ---
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint
        entry: bash -c "cd frontend && npx eslint --max-warnings=0 ."
        language: system
        pass_filenames: false
        files: ^frontend/src/

  # --- Frontend: build and stage dist output ---
  - repo: local
    hooks:
      - id: frontend-build
        name: frontend-build
        entry: bash -c "cd frontend && npm run build && git -C .. add nomarr/public_html/"
        language: system
        pass_filenames: false
        files: ^frontend/src/
        stages: [pre-commit]

  # --- Agent dashboard: update metrics on every commit ---
  - repo: local
    hooks:
      - id: agent-dashboard
        name: agent-dashboard
        entry: bash -c ".venv/Scripts/python.exe -m scripts.diagnostics.agent_dashboard && git add scripts/diagnostics/outputs/agent_dashboard.json"
        language: system
        always_run: true
        pass_filenames: false
        verbose: true
        stages: [pre-commit]
