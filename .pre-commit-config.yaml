# Pre-commit hooks: lint and type-check before every commit.
# Install: pre-commit install
# Manual run: pre-commit run --all-files

repos:
  # --- Ruff: lint + format (Python) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --- Mypy: type checking (Python) ---
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy nomarr
        language: system
        pass_filenames: false
        files: ^nomarr/

  # --- Import linter: layer boundary enforcement ---
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        entry: python -c "from importlinter.cli import lint_imports_command; lint_imports_command()"
        language: system
        pass_filenames: false
        files: ^nomarr/

  # --- Frontend: ESLint + TypeScript ---
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint
        entry: bash -c "cd frontend && npx eslint --max-warnings=0 ."
        language: system
        pass_filenames: false
        files: ^frontend/src/
