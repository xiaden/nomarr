# ======================================================================
# Nomarr User Configuration
# ======================================================================
# This file contains the ONLY user-configurable settings for Nomarr.
# All other operational parameters are internal constants and cannot
# be changed without modifying the source code.
#
# These settings cover the essential user-facing configuration:
# - Where files live (models, DB, library)
# - How tags are written (per-library file_write_mode on library settings)
# - Library scanning (auto-tag, ignore patterns)
# - Worker counts (global and per-pool for parallel processing, VRAM usage)
# - Calibration (enable calibration generation mode)
# - Authentication (admin password)
# ======================================================================

# ----------------------------------------------------------------------
# Filesystem Paths
# ----------------------------------------------------------------------
models_dir: /app/models # Directory containing ML models
db_path: /app/config/db/nomarr.db # SQLite database path
library_root: /media # Path to music library root



# ----------------------------------------------------------------------
# Library Scanning
# ----------------------------------------------------------------------
library_auto_tag: true # Auto-enqueue untagged files during scan
library_ignore_patterns:  "" # Comma-separated path patterns to skip
  # Example: "*/Audiobooks/*,*.wav"

# ----------------------------------------------------------------------
# Worker Settings
# ----------------------------------------------------------------------
# ML tagging worker count (1-8 recommended, controls VRAM usage)
# Defaults to 1 if not specified
tagger_worker_count: 1

# ----------------------------------------------------------------------
# Calibration (Developer Feature)
# ----------------------------------------------------------------------

# ----------------------------------------------------------------------
# Vector Search Quality
# ----------------------------------------------------------------------
# Controls the trade-off between search accuracy and performance.
# These are global defaults; individual libraries can override them.
vector_group_size: 15          # Songs per similarity neighborhood (5-100)
vector_search_thoroughness: 10 # Percentage of neighborhoods to scan (1-100)
calibrate_heads: false # Enable calibration generation mode

# ----------------------------------------------------------------------
# Authentication
# ----------------------------------------------------------------------
admin_password: # Admin password for web UI
  # (auto-generated if not set)

# ----------------------------------------------------------------------
# Playlist Import (Spotify)
# ----------------------------------------------------------------------
# Get credentials at https://developer.spotify.com/dashboard
spotify_client_id: # Spotify Developer App client ID
spotify_client_secret: # Spotify Developer App client secret


# ----------------------------------------------------------------------
# Navidrome API Integration (Optional)
# ----------------------------------------------------------------------
# Connect to Navidrome for Instant Mix via ML-powered audio similarity.
# Requires Navidrome v0.60.0+ with the nomarr.ndp plugin installed.
navidrome_api_url:            # Navidrome server URL (e.g. http://navidrome:4533)
navidrome_api_user:           # Navidrome admin username
navidrome_api_password:       # Navidrome admin password
navidrome_path_prefix_map:    # Comma-separated from:to path prefix pairs
  # Maps Navidrome file paths to Nomarr normalized paths
  # Example: "/music:/media/library,/podcasts:/media/pods"