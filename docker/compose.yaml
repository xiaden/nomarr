services:
  nomarr:
    # Use pre-built image from GitHub Container Registry
    # To build locally instead: uncomment 'build: .' and comment out 'image:'
    image: ghcr.io/xiaden/nomarr:latest
    # build: .
    container_name: nomarr
    user: "1000:1000"
    # Graceful shutdown: Give Nomarr 30s to shut down cleanly
    stop_grace_period: 30s
    ports:
      - "8356:8356"  # Only expose if needed outside Docker network
    volumes:
      # Required: Config and database persistence
      - ./config:/app/config
      # Required: Music library
      - /media:/media
      # Optional: Custom models (only if not using packaged models)
      # - ./models:/app/models
    env_file:
      - nomarr.env
    depends_on:
      nomarr-arangodb:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8356/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ArangoDB database service
  nomarr-arangodb:
    image: arangodb:3.12
    container_name: nomarr-arangodb
    env_file:
      - nomarr-arangodb.env
    command: ["--vector-index", "--query.memory-limit=1073741824"]
    volumes:
      - ./config/arangodb:/var/lib/arangodb3
    ports:
      - "8529:8529"  # ArangoDB Web UI
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint tcp://127.0.0.1:8529 --server.username root --server.password \"$$ARANGO_ROOT_PASSWORD\" --javascript.execute-string 'db._version()' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s